name = "mascom-phase0"
main = "k10_worker_d1_ledger.js"
compatibility_date = "2024-01-01"

# Account configuration
account_id = "f07be5f84583d0d100b05aeeae56870b"
workers_dev = true

# Environment: production (default)
[env.production]

# Environment variables (accessible as env.VARIABLE_NAME)
[env.production.vars]
WORKER_NAME = "mascom-phase0"
REGISTER_COUNT = "10"

# D1 Database binding (packet pattern ledger storage with SQL queries)
# NOTE: Replace DATABASE_ID with actual D1 database ID
# Get ID from: wrangler d1 list
[[env.production.d1_databases]]
binding = "DB"
database_id = "sync-ledger-d1"
database_name = "mascom-phase0-ledger"

# Build configuration
[build]
command = ""
cwd = ""
