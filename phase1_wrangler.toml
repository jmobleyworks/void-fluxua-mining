name = "phase1-coord"
main = "k10_worker_modern.js"
compatibility_date = "2024-01-01"

# Account configuration
account_id = "7b2347dce656e4f0959b2e20a9bafee3"
workers_dev = true

# Environment: production (default)
[env.production]

# Environment variables (accessible as env.VARIABLE_NAME)
[env.production.vars]
WORKER_NAME = "phase1-coord"
REGISTER_COUNT = "10"

# D1 Database binding (packet pattern ledger storage with SQL queries)
[[env.production.d1_databases]]
binding = "DB"
database_id = "sync-ledger-d1-phase1"
database_name = "phase1-coord-ledger"

# Build configuration
[build]
command = ""
cwd = ""
