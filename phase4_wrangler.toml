name = "phase4-coord"
main = "k10_worker_modern.js"
compatibility_date = "2024-01-01"

# Account configuration
account_id = "035924f9812920fff6b70adf2904d581"
workers_dev = true

# Environment: production (default)
[env.production]

# Environment variables (accessible as env.VARIABLE_NAME)
[env.production.vars]
WORKER_NAME = "phase4-coord"
REGISTER_COUNT = "10"

# D1 Database binding (packet pattern ledger storage with SQL queries)
[[env.production.d1_databases]]
binding = "DB"
database_id = "sync-ledger-d1-phase4"
database_name = "phase4-coord-ledger"

# Build configuration
[build]
command = ""
cwd = ""
